<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>统计</title>
  <style>
    :root{
      --xp-blue1:#1e5aa8;
      --xp-blue2:#3a7bd5;
      --xp-blue3:#0b3f8f;
      --xp-gray:#d9d9d9;
      --xp-dark:#2b2b2b;
      --xp-light:#ffffff;
      --xp-shadow: rgba(0,0,0,.25);
        --pixel: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    }

    html,body{
      height:100%;
      margin:0;
      background:
        radial-gradient(1200px 700px at 30% 20%, rgba(255,255,255,.65), rgba(255,255,255,0) 60%),
        linear-gradient(135deg, #5bb2ff 0%, #1d67c7 45%, #114e9d 100%);
      font-family: var(--pixel);
      color:#0b0b0b;
    }

    .window{
      width:min(820px, 92vw);
      margin: 24px auto;
      border-radius: 10px;
      background: #f3f3f3;
      box-shadow: 0 18px 45px var(--xp-shadow);
      border: 1px solid rgba(0,0,0,.25);
      overflow:hidden;
    }

    .titlebar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 8px 10px;
      background: linear-gradient(#4d93ff, #1a5ebf);
      color:#fff;
      user-select:none;
    }

    .title-left{
      display:flex;
      gap:10px;
      align-items:center;
      font-weight:700;
      letter-spacing:.2px;
      text-shadow: 0 1px 0 rgba(0,0,0,.35);
      font-size:14px;
    }

    .xp-orb{
      width:16px;height:16px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #ffeaa6, #ff9d00 45%, #d66b00 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 1px 0 rgba(0,0,0,.25);
      border:1px solid rgba(0,0,0,.25);
    }
.win-btns{
  display:flex;
  gap:6px;
  align-items:center;
}

.win-btns a{
  display:inline-flex;
  text-decoration:none;
}

.win-btn{
  width: 18px;
  height: 18px;
  border-radius: 3px;
  border:1px solid rgba(0,0,0,.25);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.45);
  background: linear-gradient(#f6f6f6, #d9d9d9);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  vertical-align:middle;
}

.win-btn.close{
  background: linear-gradient(#ff9a9a, #e24c4c);
}

.win-btn::after{
  display:block;
  font-size:12px;
  color:rgba(0,0,0,.65);
  font-weight:bold;
  line-height:1;
}

.win-btn.min::after{
  content:"_";
  transform: translateY(-4px);
}

.win-btn.max::after{
  content:"□";
  font-size:11px;
  transform: translateY(-1px);
}

.win-btn.close::after{
  content:"×";
  color:#fff;
  font-size:13px;
  transform: translateY(-1px);
}

    .menubar{
      background: linear-gradient(#f9f9f9, #ededed);
      border-bottom:1px solid rgba(0,0,0,.15);
      padding: 6px 10px;
      font-size:12px;
      display:flex;
      gap:14px;
      color:#1a1a1a;
    }

    .menubar span{
      padding: 2px 6px;
      border-radius: 3px;
    }

    .content{
      padding: 14px;
    }

    .main{
      background: linear-gradient(#ffffff, #f7f7f7);
      border:1px solid rgba(0,0,0,.16);
      border-radius: 8px;
      padding: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.75);
      overflow:hidden;
    }

    .marquee{
      font-size:12px;
      background: linear-gradient(#fff6c7, #ffe68a);
      border:1px solid rgba(0,0,0,.18);
      border-radius: 6px;
      padding: 6px 10px;
      margin-bottom: 14px;
      color:#5a3a00;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }

    .marquee span{
      display:inline-block;
      padding-left:100%;
      animation: scroll 18s linear infinite;
      white-space:nowrap;
    }

    @keyframes scroll{
      from{ transform: translateX(0); }
      to{ transform: translateX(-100%); }
    }

    .panel{
      background:#fff;
      border:1px solid rgba(0,0,0,.14);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 1px 0 rgba(255,255,255,.8) inset;
    }

    .panel-title{
      margin:0 0 14px;
      font-size:20px;
      color:#0b3f8f;
      font-weight:700;
    }

    .stat-block{
      padding: 12px 10px;
      border:1px solid rgba(0,0,0,.12);
      border-radius: 8px;
      background: linear-gradient(#ffffff, #f6f6f6);
      margin-bottom: 12px;
    }

    .stat-block:last-child{
      margin-bottom:0;
    }

    .site-title{
      font-size:15px;
      color:#1a1a1a;
      margin-bottom:10px;
      font-weight:700;
    }

    .site-title a{
      color:#0b3f8f;
      text-decoration:none;
    }

    .site-title a:hover{
      text-decoration:underline;
    }

    .stat-row{
      display:none;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
      margin:10px 0;
      font-size:14px;
      line-height:1.5;
    }

    .stat-row.ready{
      display:flex;
    }

    .label{
      min-width:120px;
      color:#333;
      font-weight:700;
    }

    .counter-img{
      display:inline-block;
      vertical-align:middle;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      min-height: 32px;
    }

.date-box{
  display:inline-block;
  padding: 5px 10px;
  border:1px solid #0f0;
  background:#000;
  color:#00ff66;
  border-radius: 4px;
  font-size:14px;
  box-shadow: inset 0 0 0 1px rgba(0,255,0,.15);
}

    .footer{
      padding: 10px 12px 14px;
      font-size:12px;
      color:#1a1a1a;
      background: linear-gradient(#f5f5f5, #e9e9e9);
      border-top:1px solid rgba(0,0,0,.14);
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .status{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .led{
      width:10px;height:10px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #b9ffb9, #1fd21f 55%, #0a7f0a 100%);
      border:1px solid rgba(0,0,0,.25);
      box-shadow: 0 1px 0 rgba(255,255,255,.6) inset;
    }

    .footer a{
      color:#0b3f8f;
      text-decoration:none;
    }

    .footer a:hover{
      text-decoration:underline;
    }

    .hidden-source{
      display:none;
    }

    @media (max-width: 640px){
      .window{
        width:95vw;
      }

      .label{
        min-width:auto;
        width:100%;
      }

      .stat-row.ready{
        display:block;
      }

      .counter-img{
        margin-top:6px;
      }
    }
  </style>
</head>

<body>
  <div class="window">
    <div class="titlebar">
      <div class="title-left">
        <div class="xp-orb" aria-hidden="true"></div>
        <div>统计</div>
      </div>
      <div class="win-btns" aria-hidden="true">
        <div class="win-btn min" title="Minimize"></div>
        <div class="win-btn max" title="Maximize"></div>
        <a href="https://maonie.neocities.org/index2"><div class="win-btn close" title="Close"></div></a>
      </div>
    </div>

    <div class="menubar" aria-hidden="true">
      <span>File</span><span>Edit</span><span>View</span><span>Favorites</span><span>Tools</span><span>Help</span>
    </div>

    <div class="content">
      <main class="main">
        <div class="marquee">
          <span>不算子（<a href="https://www.busuanzi.cc/count.php?search=maonie.top">www.busuanzi.cc</a>）加载需要时间... 请耐心等待！</span>
        </div>

        <div class="panel">
          <h2 class="panel-title">访问量统计面板</h2>

          <section class="stat-block">
            <div class="site-title">
              猫涅的秘密结社 /
              <a href="https://maonie.neocities.org/" target="_blank">maonie.neocities.org</a>
            </div>

            <div class="stat-row" id="neo-views-row">
              <span class="label">总访问量</span>
              <img id="neo-views-img" class="counter-img" alt="Neocities 总访问量">
            </div>

            <div class="stat-row" id="neo-date-row">
              <span class="label">最后更新</span>
              <span id="lastupdate" class="date-box"></span>
            </div>
          </section>

          <section class="stat-block">
            <div class="site-title">
              猫涅的技术博客 /
              <a href="https://www.maonie.top/" target="_blank">maonie.top</a>
            </div>

            <div class="stat-row" id="busuanzi-site-row">
              <span class="label">站点总访问量</span>
              <img id="busuanzi-site-pv-img" class="counter-img" alt="站点总访问量">
            </div>
          </section>
        <section class="stat-block">
            <div class="site-title">
              本页面 
            </div>
            <div class="stat-row" id="busuanzi-page-row">
              <span class="label">您是第</span>
              <img id="busuanzi-page-uv-img" class="counter-img" alt="本页访客数">位访问者
            </div>
        </section>
        </div>
      </main>
    </div>

    <div class="footer">
      <div class="status">
        <span class="led" aria-hidden="true"></span>
        <span>STATUS: <b>READY</b></span>
      </div>
      <div>
        <span>Tip: 数字会在成功读取后变成图片计数器显示</span>
        &nbsp;·&nbsp;
        <a href="#" onclick="alert('要是图片挂了或者有啥情况记得反馈'); return false;">Help</a>
      </div>
    </div>
  </div>

  <div class="hidden-source">
    <span id="busuanzi_site_pv">加载中...</span>
    <span id="busuanzi_page_uv">加载中...</span>
  </div>

  <script src="//cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js" defer></script>

  <script>
    function createCounterSrc(num) {
      return "https://count.getloli.com/@" + encodeURIComponent(String(num)) +
        "?name=" + encodeURIComponent(String(num)) +
        "&theme=gelbooru" +
        "&padding=7" +
        "&offset=0" +
        "&align=top" +
        "&scale=0.9" +
        "&pixelated=1" +
        "&darkmode=auto" +
        "&num=" + encodeURIComponent(String(num));
    }

    function cleanNumber(text) {
      if (!text) return "";
      return String(text).replace(/[^\d]/g, "");
    }

    function setCounterImage(imgId, value) {
      var img = document.getElementById(imgId);
      if (!img || !value) return;
      img.src = createCounterSrc(value);
      img.alt = value;
    }

    function showRow(rowId) {
      var row = document.getElementById(rowId);
      if (row) row.classList.add("ready");
    }

    function formatDateToCN(dateString) {
      var d = new Date(dateString);
      if (isNaN(d.getTime())) return "";
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, "0");
      var day = String(d.getDate()).padStart(2, "0");
      return y + "年" + m + "月" + day + "日";
    }

    (function () {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function () {
        if (this.readyState === 4 && this.status === 200) {
          try {
            var site_data = JSON.parse(this.responseText);
            var views = cleanNumber(site_data.info.views);
            var lastUpdated = formatDateToCN(site_data.info.last_updated);

            if (views) {
              setCounterImage("neo-views-img", views);
              showRow("neo-views-row");
            }

            if (lastUpdated) {
              document.getElementById("lastupdate").textContent = lastUpdated;
              showRow("neo-date-row");
            }
          } catch (e) {
            console.error("Neocities 数据解析失败：", e);
          }
        }
      };
      xhttp.open(
        "GET",
        "https://weirdscifi.ratiosemper.com/neocities.php?sitename=maonie",
        true
      );
      xhttp.send();
    })();

    function waitForBusuanziValue(sourceId, imgId, rowId, maxRetry) {
      var retry = 0;
      var timer = setInterval(function () {
        var el = document.getElementById(sourceId);
        var raw = el ? el.textContent : "";
        var value = cleanNumber(raw);

        if (value) {
          setCounterImage(imgId, value);
          showRow(rowId);
          clearInterval(timer);
          return;
        }

        retry++;
        if (retry > maxRetry) {
          clearInterval(timer);
        }
      }, 500);
    }

    window.addEventListener("load", function () {
      waitForBusuanziValue("busuanzi_site_pv", "busuanzi-site-pv-img", "busuanzi-site-row", 40);
      waitForBusuanziValue("busuanzi_page_uv", "busuanzi-page-uv-img", "busuanzi-page-row", 40);
    });
  </script>
</body>
</html>
